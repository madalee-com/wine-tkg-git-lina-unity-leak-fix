name: Proton - Wine 10.20 - Lina Unity Leak Patch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          echo -e "[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
          pacman -Syu --noconfirm base-devel sudo lib32-jack2
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
          export CARGO_HOME="$PWD"
          cd proton-tkg
          sed -i 's/uninstaller="false"/uninstaller="true"/' proton-tkg.cfg
          sed -i 's/autoinstall="false"/autoinstall="true"/' proton-tkg.cfg
          sed -i 's/LOCAL_PRESET=""/LOCAL_PRESET="none"/' proton-tkg.cfg
          sed -i 's/_use_GE_patches="true"/_use_GE_patches="true"/' proton-tkg.cfg
          sed -i 's/_GE_WAYLAND="true"/_GE_WAYLAND="true"/' proton-tkg.cfg
          sed -i 's/_proton_mf_patches="true"/_proton_mf_patches="true"/' proton-tkg.cfg
          sed -i 's/_protonify="true"/_protonify="true"/' proton-tkg.cfg
          sed -i 's/build_gstreamer="false"/build_gstreamer="true"/' proton-tkg.cfg
          sed -i 's/lib32_gstreamer="false"/lib32_gstreamer="true"/' proton-tkg.cfg
          sed -i 's/wayland_driver="false"/wayland_driver="false"/' proton-tkg.cfg
          sed -i 's/_plain_version=""/_plain_version="refs\/tags\/wine-10.20"/' proton-tkg.cfg
          sed -i 's/_use_staging="true"/_use_staging="false"/' proton-tkg.cfg
          echo _win10_default="true" >> proton-tkg.cfg
          sed -i 's/_use_josh_flat_theme="true"/_use_josh_flat_theme="false"/' proton-tkg.cfg
          #sed -i 's/_proton_fs_hack="true"/_proton_fs_hack="false"/' proton-tkg.cfg
          echo _childwindow_fix="true" >> proton-tkg.cfg
          #sed -i '/_community_patches/c\_community_patches=""' proton-tkg.cfg
          sed -i 's/_no_container="false"/_no_container="true"/' proton-tkg.sh
          echo _PKGNAME_OVERRIDE="tkg-10_20-lina-unity-leak-patch" >> proton-tkg.cfg
          echo _nomakepkg_nover="true" >> proton-tkg.cfg
          yes|./proton-tkg.sh
      - name: Archive the artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-tkg-build
          path: proton-tkg/built

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Release 10.4
          preserve_order: true
          files: |
            *