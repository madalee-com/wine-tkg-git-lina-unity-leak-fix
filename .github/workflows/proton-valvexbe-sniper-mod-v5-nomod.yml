name: Proton Sniper Lina Unity Leak Patch v5-nomod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        uses: LizardByte/actions/actions/more_space@master
        with:
          analyze-space-savings: true
          clean-all: true
          safe-packages: "patch,git"
      - name: Display Analysis
        run: echo '${{ steps.cleanup.outputs.space-analysis }}'
      - uses: actions/checkout@v5
      - name: Compile
        run: |
          cd proton-tkg
          sed -i 's/uninstaller="false"/uninstaller="true"/' proton-tkg.cfg
          sed -i 's/autoinstall="false"/autoinstall="true"/' proton-tkg.cfg
          sed -i 's/_no_container="true"/_no_container="false"/' proton-tkg.sh
          sed -i 's/_plain_version=""/_plain_version="refs\/tags\/proton-11.0-1-beta2"/' proton-tkg.cfg
          sed -i 's/_use_staging="true"/_use_staging="false"/' proton-tkg.cfg
          echo '_ci_build="true"' >> proton-tkg.cfg
          sed -i 's/_PROTON_NAME_ADDON=""/_PROTON_NAME_ADDON="sniper-lina-unity-leak-patch-v5-nomod"/' proton-tkg-profiles/advanced-customization.cfg
          #cp ../custom-proton/lina-fix-v5-nomod-proton.mypatch ../wine-tkg-git/wine-tkg-userpatches/
          yes|./proton-tkg.sh
          cd built
          cd proton_tkg_e*
          patch < ../../../custom-proton/proton-warudo-v5.diff
          cd ..
          tar -cvzf ../Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.tar.gz ./
          cd ..
          sha512sum Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.tar.gz > Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.sha512sum
      - name: Archive tar gz
        uses: actions/upload-artifact@v5
        with:
          name: Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod
          path: proton-tkg/Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.tar.gz
      - name: Archive tar sha512sum
        uses: actions/upload-artifact@v5
        with:
          name: Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod-sha512sum
          path: proton-tkg/Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.sha512sum

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: TKG Proton Sniper - Lina Unity Leak Patch v5-nomod
          preserve_order: true
          files: |
            Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod/Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.tar.gz
            Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod-sha512sum/Proton-Sniper-Lina-Unity-Leak-Patch-v5-nomod.sha512sum