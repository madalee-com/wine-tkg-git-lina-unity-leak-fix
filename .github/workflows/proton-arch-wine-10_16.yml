name: Proton nopackage Arch Linux - Wine 10.20

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          echo -e "[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
          pacman -Syu --noconfirm base-devel sudo lib32-jack2
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
          export CARGO_HOME="$PWD"
          cd proton-tkg
          sed -i 's/uninstaller="false"/uninstaller="true"/' proton-tkg.cfg
          sed -i 's/autoinstall="false"/autoinstall="true"/' proton-tkg.cfg
          sed -i 's/LOCAL_PRESET=""/LOCAL_PRESET="none"/' proton-tkg.cfg
          sed -i 's/build_gstreamer="false"/build_gstreamer="true"/' proton-tkg.cfg
          sed -i 's/lib32_gstreamer="false"/lib32_gstreamer="true"/' proton-tkg.cfg
          sed -i 's/wayland_driver="false"/wayland_driver="true"/' proton-tkg.cfg
          sed -i 's/_plain_version=""/_plain_version="refs\/tags\/wine-10.16"/' proton-tkg.cfg
          sed -i 's/_use_staging="true"/_use_staging="false"/' proton-tkg.cfg
          sed -i '/_community_patches/c\_community_patches=""' proton-tkg.cfg
          sed -i 's/_no_container="false"/_no_container="true"/' proton-tkg.sh
          echo _PROTON_NAME_ADDON="-lina-unity-leak-patch" >> proton-tkg.cfg
          touch tarplz
          yes|./proton-tkg.sh
      - name: Archive the artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proton-tkg-build-lina-unity-leak-patch
          path: proton-tkg/built/*.tar

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Release 10.16
          preserve_order: true
          files: |
            *

