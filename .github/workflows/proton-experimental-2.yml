name: TKG Proton Experimenta - 2 - Lina Unity Leak Patch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          echo -e "[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
          pacman -Syu --noconfirm base-devel sudo lib32-jack2
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
          export CARGO_HOME="$PWD"
          cd proton-tkg
          sed -i 's/uninstaller="false"/uninstaller="true"/' proton-tkg.cfg
          sed -i 's/autoinstall="false"/autoinstall="true"/' proton-tkg.cfg
          #sed -i 's/build_gstreamer="false"/build_gstreamer="true"/' proton-tkg.cfg
          #sed -i 's/lib32_gstreamer="false"/lib32_gstreamer="true"/' proton-tkg.cfg
          sed -i 's/wayland_driver="false"/wayland_driver="true"/' proton-tkg.cfg
          sed -i 's/_nosteamruntime="false"/_nosteamruntime="sniper"/' proton-tkg-profiles/advanced-customization.cfg
          sed -i 's/_no_container="false"/_no_container="true"/' proton-tkg.sh
          sed -i 's/_PROTON_NAME_ADDON=""/_PROTON_NAME_ADDON="lina-unity-leak-patch-2"/' proton-tkg-profiles/advanced-customization.cfg
          rm ../wine-tkg-git/wine-tkg-userpatches/lina-unity-leak.mypatch
          yes|./proton-tkg.sh
          cd built
          cd proton_tkg_e*
          sed -i 's/# disable dxvknvapi for titles which dislike it/# disable dxvknvapi for titles which dislike it\n                "2079120", #Warudo/' proton
          cd ..
          tar -cvzf ../Proton-Experimental-2-Lina-Unity-Leak-Patch.tar.gz ./
          cd ..
          sha512sum Proton-Experimental-2-Lina-Unity-Leak-Patch.tar.gz > Proton-Experimental-2-Lina-Unity-Leak-Patch.sha512sum
      - name: Archive tar gz
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Experimental-2-Lina-Unity-Leak-Patch
          path: proton-tkg/Proton-Experimental-2-Lina-Unity-Leak-Patch.tar.gz
      - name: Archive tar sha512sum
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Experimental-2-Lina-Unity-Leak-Patch-sha512sum
          path: proton-tkg/Proton-Experimental-2-Lina-Unity-Leak-Patch.sha512sum


  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: TKG Proton Experimental - 2 - Lina Unity Leak Patch
          preserve_order: true
          files: |
            Proton-Experimental-2-Lina-Unity-Leak-Patch/Proton-Experimental-2-Lina-Unity-Leak-Patch.tar.gz
            Proton-Experimental-2-Lina-Unity-Leak-Patch-sha512sum/Proton-Experimental-2-Lina-Unity-Leak-Patch.sha512sum
            