name: Proton - Wine 11.0 - Lina Unity Leak Patch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          echo -e "[multilib]\nInclude = /etc/pacman.d/mirrorlist" >> /etc/pacman.conf
          pacman -Syu --noconfirm base-devel sudo lib32-jack2
          useradd user -G wheel && echo "user ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown user -R ..
          chown user -R /tmp
          export CARGO_HOME="$PWD"
          cd proton-tkg
          sed -i 's/uninstaller="false"/uninstaller="true"/' proton-tkg.cfg
          sed -i 's/autoinstall="false"/autoinstall="true"/' proton-tkg.cfg
          sed -i 's/LOCAL_PRESET=""/LOCAL_PRESET="none"/' proton-tkg.cfg
          sed -i 's/_use_GE_patches="true"/_use_GE_patches="false"/' proton-tkg.cfg
          sed -i 's/_GE_WAYLAND="true"/_GE_WAYLAND="false"/' proton-tkg.cfg
          sed -i 's/_proton_mf_patches="true"/_proton_mf_patches="false"/' proton-tkg.cfg
          sed -i 's/_protonify="true"/_protonify="false"/' proton-tkg.cfg
          sed -i 's/build_gstreamer="false"/build_gstreamer="false"/' proton-tkg.cfg
          sed -i 's/lib32_gstreamer="false"/lib32_gstreamer="false"/' proton-tkg.cfg
          sed -i 's/wayland_driver="false"/wayland_driver="false"/' proton-tkg.cfg
          sed -i 's/_plain_version=""/_plain_version="refs\/tags\/wine-11.0"/' proton-tkg.cfg
          sed -i 's/_use_staging="true"/_use_staging="false"/' proton-tkg.cfg
          sed -i 's/_proton_fs_hack="true"/_proton_fs_hack="false"/' proton-tkg.cfg
          sed -i 's/_use_josh_flat_theme="true"/_use_josh_flat_theme="false"/' proton-tkg.cfg
          sed -i 's/_build_mediaconv="true"/_build_mediaconv="false"/' proton-tkg.cfg
          #sed -i 's/_NOLIB32="false"/_NOLIB32="true"/' proton-tkg-profiles/advanced-customization.cfg
          sed -i 's/_NOCCACHE="false"/_NOCCACHE="true"/' proton-tkg-profiles/advanced-customization.cfg
          sed -i '/_community_patches/c\_community_patches=""' proton-tkg.cfg
          #echo _win10_default="true" >> proton-tkg.cfg
          echo _childwindow_fix="true" >> proton-tkg.cfg
          echo _proton_nvapi_disable="true" >> proton-tkg.cfg
          #echo _unfrog="true" >> proton-tkg.cfg
          echo _user_patches="false" >> proton-tkg.cfg
          sed -i 's/_no_container="false"/_no_container="true"/' proton-tkg.sh
          sed -i 's/_PROTON_NAME_ADDON=""/_PROTON_NAME_ADDON="lina-unity-leak-patch"/' proton-tkg-profiles/advanced-customization.cfg
          rm ../wine-tkg-git/wine-tkg-userpatches/lina-unity-leak-new-proton.mypatch
          yes|./proton-tkg.sh
          cd built
          tar -cvzf ../Proton-Wine-11_0-Lina-Unity-Leak-Patch.tar.gz ./
          cd ..
          sha512sum Proton-Wine-11_0-Lina-Unity-Leak-Patch.tar.gz > Proton-Wine-11_0-Lina-Unity-Leak-Patch.sha512sum
      - name: Archive tar gz
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Wine-11_0-Lina-Unity-Leak-Patch
          path: proton-tkg/Proton-Wine-11_0-Lina-Unity-Leak-Patch.tar.gz
      - name: Archive tar sha512sum
        uses: actions/upload-artifact@v4
        with:
          name: Proton-Wine-11_0-Lina-Unity-Leak-Patch-sha512sum
          path: proton-tkg/Proton-Wine-11_0-Lina-Unity-Leak-Patch.sha512sum


  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: TKG Proton Wine - 11.0 - Lina Unity Leak Patch
          preserve_order: true
          files: |
            Proton-Wine-11_0-Lina-Unity-Leak-Patch/Proton-Wine-11_0-Lina-Unity-Leak-Patch.tar.gz
            Proton-Wine-11_0-Lina-Unity-Leak-Patch-sha512sum/Proton-Wine-11_0-Lina-Unity-Leak-Patch.sha512sum
            